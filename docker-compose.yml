version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neuroscan_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/models:/app/models
      - ./backend/brain_tumor.db:/app/brain_tumor.db
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - CONFIDENCE_THRESHOLD=0.75
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neuroscan_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
